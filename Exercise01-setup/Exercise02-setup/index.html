<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2.1 Bootstrap Structure</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1 class="text-primary">
        Bootstrap Folder Structure
    </h1>

    <div class="card mt-4">
        <div class="card-body">

            <h3>CSS Folder</h3>
            <p>
                Contains Bootstrap styles for buttons,
                forms, layouts, colors and typography.
            </p>

            <h3>JS Folder</h3>
            <p>
                Contains JavaScript files for Modal,
                Accordion, Dropdown and Navbar.
            </p>

            <h3>Icons Folder</h3>
            <p>
                Contains Bootstrap Icons used in webpages.
            </p>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
